<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>POS — Offline</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F5F3F1;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #2B1D1A;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: #FFFFFF;
      border: 1px solid #DDD2CC;
      border-radius: 18px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(62,39,35,0.08);
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border-radius: 16px;
      background: #3E2723;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg { width: 30px; height: 30px; }
    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.2px;
    }
    p {
      margin: 0 0 22px;
      font-size: 13px;
      line-height: 1.5;
      color: #6B5B57;
    }
    button {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: #3E2723;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
    }
    button:active { opacity: 0.85; }
    .status {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #A09490;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #B71C1C;
    }
    .dot.online { background: #2E7D4F; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 18h.01M8.5 14.5a5 5 0 0 1 7 0M5 11a10 10 0 0 1 14 0M2 7.5a15 15 0 0 1 20 0" stroke="#D4A373" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>No internet connection right now. Check your Wi-Fi or mobile data — POS will reconnect automatically once you're back online.</p>
    <button onclick="location.reload()">Try Again</button>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Waiting for connection…</span>
    </div>
  </div>
  <script>
    function updateStatus() {
      var dot  = document.getElementById('statusDot');
      var text = document.getElementById('statusText');
      if (navigator.onLine) {
        dot.classList.add('online');
        text.textContent = 'Back online — reloading…';
        setTimeout(function () { location.reload(); }, 600);
      }
    }
    window.addEventListener('online', updateStatus);
    updateStatus();
  </script>
</body>
</html>
